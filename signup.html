<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Faça seu cadastro</title>
</head>
<body>

    <div id="wrapper">
        <div id="container-signup">


            <div class="column">
                <div class="login-panel">
                    <div class = "logo">
                        <img class="logo-img" src="img/logo.png" alt="Instagram Logo">
                    </div>

                    <div class="message">
                        <span>Cadastre-se para ver fotos e videos dos seus amigos.</span>
                    </div>

                    <button class="cta-button">
                        Entrar com facebook
                    </button>

                    <div class="divisor-container">
                        <div class="line"></div>
                        <div class="divisor-tag">ou</div>
                        <div class="line"></div>
                    </div>

                    <form>
                        <input placeholder="Número de celular ou email" type="text" name="username"/>
                        <input placeholder="Nome completo" type="text" name="username"/>
                        <input placeholder="Nome de usuário" type="text" name="username"/>
                        <input placeholder="Senha" type="password" name="password"/>
                        <input type="submit" value="Entrar"/>
                    </form>
                </div>

                <div class="infobox">
                    <p>Tem uma conta? <a href="index.html">Conecte-se</a></p>
                </div>

                <div class="get-app-panel">
                    <p>Obtenha o aplicativo.</p>
                    <div class="app-buttons">
                        <a href="#"><img src="img/appstore.png" alt="App Store"></a>
                        <a href="#"><img src="img/googleplay.png" alt="Google Play"></a>
                    </div>

                </div>
            </div>
        </div>

        <footer>
            <div class="footer-inner">
                <a href="#">About us</a>
                <a href="#">Support</a>
                <a href="#">Blog</a>
                <a href="#">Press</a>
                <a href="#">Jobs</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Directory</a>
                <a href="#">Profiles</a>
                <a href="#">Hashtags</a>
                <a href="#">Language</a>
                <div class="text-small">© 2026 Instagram</div>
            </div>

        </footer>

    </div>
    
    
</body>
</html>
