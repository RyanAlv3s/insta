<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Instagram</title>
</head>
<body>

    <div id="wrapper">
        <div id="container">
            <div class="column left">
                <div class="main">

                </div>
            </div>

            <div class="column right">
                <div class="login-panel">
                    <div class = "logo">
                        <img class="logo-img" src="img/logo.png" alt="Instagram Logo">
                    </div>

                    <form>
                        <input placeholder="Telefone, usuário ou email" type="text" name="username"/>
                        <input placeholder="Senha" type="password" name="password"/>
                        <input type="submit" value="Entrar"/>
                    </form>
                </div>

                <div class="infobox">
                    <p>Não possui uma conta? <a href="#">Cadastre-se</a></p>
                </div>

                <div class="get-app-panel">
                    <p>Obtenha o aplicativo.</p>
                    <div class="app-buttons">
                        <a href="#"><img src="img/appstore.png" alt="App Store"></a>
                        <a href="#"><img src="img/googleplay.png" alt="Google Play"></a>
                    </div>

                </div>
            </div>
        </div>

        <footer>
            <div class="footer-inner">
                <a href="#">About us</a>
                <a href="#">Support</a>
                <a href="#">Blog</a>
                <a href="#">Press</a>
                <a href="#">Jobs</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Directory</a>
                <a href="#">Profiles</a>
                <a href="#">Hashtags</a>
                <a href="#">Language</a>
                <div class="text-small">@ 2022 Instagram from Meta</div>
            </div>

        </footer>

    </div>
    
    
</body>
</html>
